const PHASES = [
  { name: "INSTALL & ORIENT", color: "#7c3aed", days: "Days 1-2", icon: "⚡" },
  { name: "CORE SKILLS", color: "#b54a6a", days: "Days 3-7", icon: "🔥" },
  { name: "INTERMEDIATE", color: "#d97706", days: "Days 8-11", icon: "⚡" },
  { name: "CAPSTONE", color: "#059669", days: "Days 12-14", icon: "🏆" }
];

const TOTAL_XP = DAYS.reduce((sum, d) => sum + d.xp, 0);

function TableauQuest() {
  const [completedTasks, setCompletedTasks] = useState({});
  const [selectedDay, setSelectedDay] = useState(null);
  const [showConfetti, setShowConfetti] = useState(false);
  const [earnedBadges, setEarnedBadges] = useState(new Set());
  const [activeTab, setActiveTab] = useState("roadmap");
  const confettiTimeout = useRef(null);

  useEffect(() => {
    try {
      const saved = localStorage.getItem("tableau-quest-progress");
      if (saved) {
        const data = JSON.parse(saved);
        setCompletedTasks(data.completedTasks || {});
        setEarnedBadges(new Set(data.earnedBadges || []));
      }
    } catch (e) {}
  }, []);

  useEffect(() => {
    try {
      localStorage.setItem("tableau-quest-progress", JSON.stringify({
        completedTasks,
        earnedBadges: [...earnedBadges]
      }));
    } catch (e) {}
  }, [completedTasks, earnedBadges]);

  const toggleTask = (dayIdx, taskIdx) => {
    const key = `${dayIdx}-${taskIdx}`;
    setCompletedTasks(prev => {
      const next = { ...prev };
      if (next[key]) delete next[key];
      else next[key] = true;
      return next;
    });
    const day = DAYS[dayIdx];
    const allDone = day.tasks.every((_, ti) => {
      const k = `${dayIdx}-${ti}`;
      return k === key ? !completedTasks[k] : completedTasks[k];
    });
    if (allDone && !earnedBadges.has(dayIdx)) {
      setEarnedBadges(prev => new Set([...prev, dayIdx]));
      setShowConfetti(true);
      if (confettiTimeout.current) clearTimeout(confettiTimeout.current);
      confettiTimeout.current = setTimeout(() => setShowConfetti(false), 3000);
    }
  };

  const getDayProgress = (dayIdx) => {
    const day = DAYS[dayIdx];
    const done = day.tasks.filter((_, ti) => completedTasks[`${dayIdx}-${ti}`]).length;
    return { done, total: day.tasks.length, pct: Math.round((done / day.tasks.length) * 100) };
  };

  const totalXPEarned = DAYS.reduce((sum, day, di) => {
    const prog = getDayProgress(di);
    return sum + (prog.pct === 100 ? day.xp : Math.round(day.xp * prog.pct / 100 * 0.5));
  }, 0);

  const totalTasksDone = Object.keys(completedTasks).length;
  const totalTasks = DAYS.reduce((s, d) => s + d.tasks.length, 0);

  const getLevel = () => {
    if (totalXPEarned < 300) return { level: 1, title: "Data Padawan", next: 300 };
    if (totalXPEarned < 700) return { level: 2, title: "Chart Apprentice", next: 700 };
    if (totalXPEarned < 1200) return { level: 3, title: "Viz Journeyman", next: 1200 };
    if (totalXPEarned < 1800) return { level: 4, title: "Dashboard Knight", next: 1800 };
    if (totalXPEarned < 2500) return { level: 5, title: "Tableau Warrior", next: 2500 };
    return { level: 6, title: "Visualization Master", next: TOTAL_XP };
  };

  const level = getLevel();
  const phaseForDay = (d) => PHASES.find(p => p.name === d.phase);

  return (
    <div style={{
      fontFamily: "'Source Sans 3', 'Source Sans Pro', system-ui, sans-serif",
      background: "#0f0f13", color: "#e8e4e0", minHeight: "100vh", position: "relative", overflow: "hidden"
    }}>
      {showConfetti && (
        <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 999 }}>
          {Array.from({ length: 40 }).map((_, i) => (
            <div key={i} style={{
              position: "absolute", left: `${Math.random() * 100}%`, top: "-20px",
              width: `${6 + Math.random() * 8}px`, height: `${6 + Math.random() * 8}px`,
              background: ["#b54a6a", "#7c3aed", "#d97706", "#059669", "#f472b6", "#fbbf24"][Math.floor(Math.random() * 6)],
              borderRadius: Math.random() > 0.5 ? "50%" : "2px",
              animation: `confettiFall ${1.5 + Math.random() * 2}s ease-in forwards`,
              animationDelay: `${Math.random() * 0.5}s`,
              transform: `rotate(${Math.random() * 360}deg)`
            }} />
          ))}
        </div>
      )}

      {/* Header */}
      <div style={{
        background: "linear-gradient(135deg, #1a1020 0%, #0f0f13 50%, #151218 100%)",
        borderBottom: "1px solid rgba(181, 74, 106, 0.2)", padding: "28px 24px 20px"
      }}>
        <div style={{ maxWidth: 900, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
            <span style={{ fontSize: 28 }}>🎮</span>
            <h1 style={{
              fontFamily: "'Playfair Display', Georgia, serif", fontSize: "clamp(24px, 4vw, 34px)",
              fontWeight: 800, margin: 0,
              background: "linear-gradient(135deg, #f0c6d4, #b54a6a, #7c3aed)",
              WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent"
            }}>Tableau Quest</h1>
          </div>
          <p style={{ color: "#9a8f9e", margin: "4px 0 16px", fontSize: 14, fontWeight: 300 }}>
            14-day gamified learning path — zero to proficient
          </p>
          <div style={{ display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
            <div style={{ flex: 1, minWidth: 200 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4, color: "#9a8f9e" }}>
                <span>LVL {level.level} — {level.title}</span>
                <span>{totalXPEarned} / {level.next} XP</span>
              </div>
              <div style={{ height: 10, borderRadius: 5, background: "#1e1e2a", overflow: "hidden", border: "1px solid rgba(181,74,106,0.15)" }}>
                <div style={{ height: "100%", borderRadius: 5, background: "linear-gradient(90deg, #b54a6a, #7c3aed)",
                  width: `${Math.min(100, (totalXPEarned / level.next) * 100)}%`, transition: "width 0.6s ease" }} />
              </div>
            </div>
            <div style={{ display: "flex", gap: 16, fontSize: 13 }}>
              <div style={{ textAlign: "center" }}>
                <div style={{ color: "#b54a6a", fontWeight: 700, fontSize: 20 }}>{totalTasksDone}</div>
                <div style={{ color: "#6a6070", fontSize: 11 }}>of {totalTasks} tasks</div>
              </div>
              <div style={{ textAlign: "center" }}>
                <div style={{ color: "#7c3aed", fontWeight: 700, fontSize: 20 }}>{earnedBadges.size}</div>
                <div style={{ color: "#6a6070", fontSize: 11 }}>of 14 badges</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "12px 24px 0", display: "flex", gap: 4 }}>
        {[
          { id: "roadmap", label: "Roadmap", icon: "🗺️" },
          { id: "badges", label: "Badges", icon: "🏅" },
          { id: "resources", label: "Resources", icon: "📚" }
        ].map(tab => (
          <button key={tab.id} className="tab-btn" onClick={() => { setActiveTab(tab.id); setSelectedDay(null); }} style={{
            background: activeTab === tab.id ? "rgba(181, 74, 106, 0.2)" : "transparent",
            border: activeTab === tab.id ? "1px solid rgba(181,74,106,0.3)" : "1px solid transparent",
            color: activeTab === tab.id ? "#f0c6d4" : "#6a6070",
            padding: "8px 16px", borderRadius: "8px 8px 0 0", cursor: "pointer",
            fontSize: 13, fontWeight: activeTab === tab.id ? 600 : 400, fontFamily: "inherit"
          }}>{tab.icon} {tab.label}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "16px 24px 40px" }}>

        {activeTab === "roadmap" && !selectedDay && selectedDay !== 0 && (
          <div>
            {PHASES.map((phase, pi) => (
              <div key={pi} style={{ marginBottom: 28 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                  <span style={{ fontSize: 18 }}>{phase.icon}</span>
                  <h2 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 18, fontWeight: 700, margin: 0, color: phase.color }}>{phase.name}</h2>
                  <span style={{ fontSize: 12, color: "#6a6070", marginLeft: 4 }}>{phase.days}</span>
                </div>
                <div style={{ display: "grid", gap: 10 }}>
                  {DAYS.filter(d => d.phase === phase.name).map((day) => {
                    const di = day.day - 1;
                    const prog = getDayProgress(di);
                    const isComplete = prog.pct === 100;
                    return (
                      <button key={di} className="day-card" onClick={() => setSelectedDay(di)} style={{
                        display: "flex", alignItems: "center", gap: 14,
                        background: isComplete ? "linear-gradient(135deg, rgba(5,150,105,0.12), rgba(5,150,105,0.04))" : "rgba(26, 24, 34, 0.7)",
                        border: isComplete ? "1px solid rgba(5,150,105,0.3)" : "1px solid rgba(60,56,70,0.4)",
                        borderRadius: 12, padding: "14px 18px", cursor: "pointer", transition: "all 0.2s",
                        width: "100%", textAlign: "left", fontFamily: "inherit", color: "inherit"
                      }}>
                        <div style={{
                          width: 44, height: 44, borderRadius: 10,
                          background: isComplete ? "rgba(5,150,105,0.2)" : `${phase.color}15`,
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontSize: 22, flexShrink: 0,
                          border: `1px solid ${isComplete ? "rgba(5,150,105,0.3)" : phase.color + "30"}`
                        }}>{isComplete ? "✅" : day.emoji}</div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2 }}>
                            <span style={{ fontSize: 11, color: phase.color, fontWeight: 600 }}>DAY {day.day}</span>
                            <span style={{ fontSize: 14, fontWeight: 600, color: isComplete ? "#6ee7b7" : "#e8e4e0",
                              overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{day.title}</span>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <div style={{ flex: 1, height: 4, borderRadius: 2, background: "#2a2834", maxWidth: 120 }}>
                              <div style={{ height: "100%", borderRadius: 2, background: isComplete ? "#059669" : phase.color,
                                width: `${prog.pct}%`, transition: "width 0.4s ease" }} />
                            </div>
                            <span style={{ fontSize: 11, color: "#6a6070" }}>{prog.done}/{prog.total}</span>
                            <span style={{ fontSize: 11, color: "#4a4656" }}>•</span>
                            <span style={{ fontSize: 11, color: "#6a6070" }}>{day.timeEst}</span>
                            <span style={{ fontSize: 11, color: "#4a4656" }}>•</span>
                            <span style={{ fontSize: 11, color: "#b54a6a" }}>{day.xp} XP</span>
                          </div>
                        </div>
                        <div style={{ color: "#4a4656", fontSize: 18 }}>›</div>
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}

        {activeTab === "roadmap" && (selectedDay !== null || selectedDay === 0) && (() => {
          const di = selectedDay;
          if (di === null) return null;
          const day = DAYS[di];
          const phase = phaseForDay(day);
          const prog = getDayProgress(di);
          return (
            <div style={{ animation: "slideUp 0.3s ease" }}>
              <button onClick={() => setSelectedDay(null)} style={{
                background: "none", border: "none", color: "#b54a6a", cursor: "pointer",
                fontSize: 13, padding: "4px 0", marginBottom: 12, fontFamily: "inherit",
                display: "flex", alignItems: "center", gap: 4
              }}>← Back to roadmap</button>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                <span style={{ fontSize: 32 }}>{day.emoji}</span>
                <div>
                  <span style={{ fontSize: 11, color: phase.color, fontWeight: 600 }}>DAY {day.day} — {day.phase}</span>
                  <h2 style={{ fontFamily: "'Playfair Display', Georgia, serif",
                    fontSize: "clamp(20px, 3vw, 26px)", fontWeight: 800, margin: 0, color: "#e8e4e0" }}>{day.title}</h2>
                </div>
              </div>
              <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 20, fontSize: 13, color: "#9a8f9e" }}>
                <span>🎯 {day.focus}</span><span>⏱️ {day.timeEst}</span>
                <span style={{ color: "#b54a6a" }}>⭐ {day.xp} XP</span>
                <span>{prog.done}/{prog.total} complete</span>
              </div>
              <div style={{ height: 6, borderRadius: 3, background: "#1e1e2a", marginBottom: 20, overflow: "hidden" }}>
                <div style={{ height: "100%", borderRadius: 3,
                  background: prog.pct === 100 ? "#059669" : `linear-gradient(90deg, ${phase.color}, #7c3aed)`,
                  width: `${prog.pct}%`, transition: "width 0.4s ease" }} />
              </div>
              <div style={{ display: "grid", gap: 6 }}>
                {day.tasks.map((task, ti) => {
                  const key = `${di}-${ti}`;
                  const isDone = completedTasks[key];
                  const isBoss = task.text.startsWith("🏆");
                  return (
                    <div key={ti} className="task-row" onClick={() => toggleTask(di, ti)} style={{
                      display: "flex", gap: 12, padding: "12px 14px",
                      background: isBoss ? (isDone ? "rgba(5,150,105,0.1)" : "rgba(181, 74, 106, 0.06)")
                        : (isDone ? "rgba(5,150,105,0.05)" : "rgba(26, 24, 34, 0.5)"),
                      border: isBoss ? `1px solid ${isDone ? "rgba(5,150,105,0.2)" : "rgba(181,74,106,0.2)"}`
                        : "1px solid rgba(60,56,70,0.2)",
                      borderRadius: 10, cursor: "pointer", transition: "all 0.15s", alignItems: "flex-start"
                    }}>
                      <div style={{
                        width: 22, height: 22, borderRadius: 6, flexShrink: 0, marginTop: 1,
                        border: isDone ? "none" : `2px solid ${isBoss ? "#b54a6a" : "#3a3846"}`,
                        background: isDone ? "#059669" : "transparent",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 12, color: "#fff", transition: "all 0.2s"
                      }}>{isDone && "✓"}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 14, fontWeight: isBoss ? 600 : 400,
                          color: isDone ? "#6a6070" : (isBoss ? "#f0c6d4" : "#d4d0cc"),
                          textDecoration: isDone ? "line-through" : "none", lineHeight: 1.4 }}>{task.text}</div>
                        <div style={{ fontSize: 12, color: isDone ? "#4a4656" : "#7a7484", marginTop: 4, lineHeight: 1.4 }}>
                          ✅ Done when: {task.done}
                        </div>
                        <div style={{ display: "flex", gap: 8, marginTop: 4, flexWrap: "wrap" }}>
                          <span style={{ fontSize: 11, color: "#5a5466" }}>⏱️ {task.time}</span>
                          {task.link && (
                            <a href={task.link} target="_blank" rel="noopener noreferrer"
                              onClick={e => e.stopPropagation()}
                              style={{ fontSize: 11, color: "#7c3aed", textDecoration: "none" }}>
                              🔗 Open resource →
                            </a>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
              {prog.pct === 100 && (
                <div style={{
                  marginTop: 20, padding: 20, borderRadius: 12,
                  background: "linear-gradient(135deg, rgba(5,150,105,0.1), rgba(124,58,237,0.1))",
                  border: "1px solid rgba(5,150,105,0.2)", textAlign: "center", animation: "badgePop 0.4s ease"
                }}>
                  <div style={{ fontSize: 36 }}>🏅</div>
                  <div style={{ fontFamily: "'Playfair Display', Georgia, serif",
                    fontSize: 18, fontWeight: 700, color: "#6ee7b7", marginTop: 4 }}>Badge Earned!</div>
                  <div style={{ fontSize: 15, color: "#9a8f9e" }}>{day.badge}</div>
                </div>
              )}
              <div style={{ marginTop: 20 }}>
                <h3 style={{ fontSize: 14, color: "#7a7484", fontWeight: 600, marginBottom: 8 }}>📚 Day {day.day} Resources</h3>
                <div style={{ display: "grid", gap: 6 }}>
                  {day.resources.map((r, ri) => (
                    <a key={ri} href={r.url} target="_blank" rel="noopener noreferrer" style={{
                      display: "block", padding: "10px 14px", background: "rgba(26, 24, 34, 0.5)",
                      border: "1px solid rgba(60,56,70,0.2)", borderRadius: 8, textDecoration: "none",
                      color: "#b3adb8", fontSize: 13
                    }}><span style={{ color: "#7c3aed" }}>→</span> {r.name}</a>
                  ))}
                </div>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 24 }}>
                {di > 0 ? (
                  <button onClick={() => setSelectedDay(di - 1)} style={{
                    background: "rgba(26,24,34,0.7)", border: "1px solid rgba(60,56,70,0.3)",
                    color: "#9a8f9e", padding: "8px 16px", borderRadius: 8, cursor: "pointer",
                    fontSize: 13, fontFamily: "inherit"
                  }}>← Day {di}</button>
                ) : <div />}
                {di < DAYS.length - 1 ? (
                  <button onClick={() => setSelectedDay(di + 1)} style={{
                    background: "rgba(181,74,106,0.15)", border: "1px solid rgba(181,74,106,0.3)",
                    color: "#f0c6d4", padding: "8px 16px", borderRadius: 8, cursor: "pointer",
                    fontSize: 13, fontFamily: "inherit"
                  }}>Day {di + 2} →</button>
                ) : <div />}
              </div>
            </div>
          );
        })()}

        {activeTab === "badges" && (
          <div style={{ animation: "slideUp 0.3s ease" }}>
            <p style={{ color: "#7a7484", fontSize: 14, marginBottom: 20 }}>
              Complete all tasks in a day to earn its badge. Collect all 14 to become a Visualization Master.
            </p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 12 }}>
              {DAYS.map((day, di) => {
                const earned = earnedBadges.has(di);
                return (
                  <div key={di} onClick={() => { setSelectedDay(di); setActiveTab("roadmap"); }} style={{
                    padding: 16, borderRadius: 12, textAlign: "center", cursor: "pointer",
                    background: earned ? "linear-gradient(135deg, rgba(5,150,105,0.12), rgba(124,58,237,0.08))" : "rgba(26, 24, 34, 0.5)",
                    border: earned ? "1px solid rgba(5,150,105,0.3)" : "1px solid rgba(60,56,70,0.2)",
                    opacity: earned ? 1 : 0.5, transition: "all 0.2s"
                  }}>
                    <div style={{ fontSize: 28, marginBottom: 4, filter: earned ? "none" : "grayscale(1)" }}>{day.emoji}</div>
                    <div style={{ fontSize: 11, fontWeight: 600, color: earned ? "#6ee7b7" : "#4a4656" }}>Day {day.day}</div>
                    <div style={{ fontSize: 12, color: earned ? "#d4d0cc" : "#3a3846", marginTop: 2, lineHeight: 1.3 }}>
                      {day.badge.replace(/\s*[🏅🔌✨🧙🔢🖼️🏆🗺️⚔️🧮📖🎲🏗️🚀]/g, "")}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {activeTab === "resources" && (
          <div style={{ animation: "slideUp 0.3s ease" }}>
            <div style={{ display: "grid", gap: 16 }}>
              {[
                { cat: "🆓 Free Tools", items: [
                  { name: "Tableau Public (Free Desktop App)", url: "https://public.tableau.com/en-us/s/download", note: "Your main practice tool — free forever" },
                  { name: "Superstore Sample Dataset", url: "https://public.tableau.com/app/learn/sample-data", note: "Built into Tableau, perfect for learning" }
                ]},
                { cat: "🎓 Core Learning", items: [
                  { name: "Trailhead — Tableau Basics Badge", url: "https://trailhead.salesforce.com/content/learn/modules/learn-about-tableau", note: "Free, gamified (you earn badges!), beginner-friendly" },
                  { name: "Coursera — Data Visualization with Tableau", url: "https://www.coursera.org/specializations/data-visualization", note: "Audit for free, structured specialization" },
                  { name: "Tableau Free Training Videos", url: "https://www.tableau.com/learn/training/20204", note: "Official video library from Tableau" }
                ]},
                { cat: "🏋️ Practice & Community", items: [
                  { name: "Makeover Monday", url: "https://www.makeovermonday.co.uk/", note: "Weekly dataset + community challenge" },
                  { name: "Workout Wednesday", url: "https://www.workout-wednesday.com/", note: "Weekly hands-on challenge to recreate a viz" },
                  { name: "Tableau Community Projects", url: "https://www.tableau.com/community/community-projects", note: "20+ community-led challenges at all levels" },
                  { name: "Viz of the Day Gallery", url: "https://public.tableau.com/app/discover/viz-of-the-day", note: "Daily inspiration from the best community vizzes" }
                ]},
                { cat: "📊 Datasets", items: [
                  { name: "Kaggle Datasets", url: "https://www.kaggle.com/datasets", note: "50K+ free datasets — filter by topic" },
                  { name: "data.world", url: "https://data.world/", note: "Curated datasets, great for social impact topics" },
                  { name: "Real World Fake Data", url: "https://data.world/markbradbourne/rwfd-real-world-fake-data", note: "Realistic business data for practice" }
                ]},
                { cat: "🏅 Certification Path", items: [
                  { name: "Trailhead — Cert Prep: Tableau Data Analyst", url: "https://trailhead.salesforce.com/content/learn/modules/cert-prep-tableau-data-analyst", note: "Free prep module for official cert" },
                  { name: "Tableau Certification Info", url: "https://www.tableau.com/learn/certification", note: "Desktop Specialist → Data Analyst → Desktop Professional" }
                ]}
              ].map((section, si) => (
                <div key={si}>
                  <h3 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 16, fontWeight: 700, color: "#d4d0cc", marginBottom: 8 }}>{section.cat}</h3>
                  <div style={{ display: "grid", gap: 6 }}>
                    {section.items.map((item, ii) => (
                      <a key={ii} href={item.url} target="_blank" rel="noopener noreferrer" style={{
                        display: "block", padding: "12px 16px", background: "rgba(26, 24, 34, 0.5)",
                        border: "1px solid rgba(60,56,70,0.2)", borderRadius: 10, textDecoration: "none"
                      }}>
                        <div style={{ fontSize: 14, color: "#e8e4e0", fontWeight: 500 }}>{item.name}</div>
                        <div style={{ fontSize: 12, color: "#6a6070", marginTop: 2 }}>{item.note}</div>
                      </a>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(TableauQuest));
</script>
</body>
</html>
